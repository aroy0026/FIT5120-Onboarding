<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunSafety - Login</title>

<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/auth.css">
</head>

<body>

<main class="container auth-page">

<section class="auth-card">

<div class="auth-header">
<p class="eyebrow">WELCOME BACK</p>
<h1 class="auth-title">Log in to SunSafety</h1>

<p class="auth-subtitle">
Access your dashboard and manage sun protection reminders.
</p>
</div>

<form id="loginForm" class="auth-form">

<label>Email Address</label>
<input type="email" id="loginEmail" placeholder="Enter your email" required>

<label>Password</label>
<input type="password" id="loginPassword" placeholder="Enter your password" required>

<button class="primary-btn auth-btn" type="submit">
Log In
</button>

</form>

<p id="loginMessage" class="auth-message"></p>

<p class="auth-footer">
Don't have an account?
<a href="signup.html">Sign up</a>
</p>

</section>

</main>

<script src="js/auth.js"></script>

</body>
</html>
